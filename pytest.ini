[pytest]
# Аргументы по умолчанию:
# -v: подробный вывод (названия тестов)
# -s: разрешить print() в консоль
# -n auto: запуск на всех ядрах (если установлен pytest-xdist)
# --tb=short: делает отчет об ошибках короче (показывает только само место падения без огромных «хвостов» кода).
addopts = -v -s --tb=short

# Indicate the root where our sources are located
pythonpath = .

markers =
    smoke
    regression
    images
    positive
    negative
    performance