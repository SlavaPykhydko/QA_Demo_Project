version: '3.8'

services:
  api-tests:
    build:
      context: .
      dockerfile: infra/Dockerfile
    # Мапим переменные окружения. Docker Compose возьмет их из системы (куда их положит GH Actions)
    environment:
      - OTEL_SERVICE_NAME=python-api-tests
      - OTEL_EXPORTER_OTLP_ENDPOINT=${GRAFANA_OTLP_ENDPOINT}
      - OTEL_EXPORTER_OTLP_HEADERS=Authorization=Basic ${GRAFANA_AUTH_TOKEN}
      - OTEL_PYTHON_LOGGING_AUTO_INSTRUMENT=true
      - OTEL_BSP_SCHEDULE_DELAY=100
      - OTEL_BSP_MAX_EXPORT_BATCH_SIZE=1
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_LOG_LEVEL=debug
      - TARGET_ENV=${TARGET_ENV}
      - THREADS=${THREADS}
      - BASE_URL_PROD=${BASE_URL_PROD}
      - X_API_KEY_PROD=${X_API_KEY_PROD}
      - URL_PREFIX_PROD=${URL_PREFIX_PROD}
      - USER_PHONE_NUMBER_PROD=${USER_PHONE_NUMBER_PROD}
      - USER_PASSWORD_PROD=${USER_PASSWORD_PROD}
      - EMPTY_USER_PHONE_NUMBER_PROD=${EMPTY_USER_PHONE_NUMBER_PROD}
      - EMPTY_USER_PASSWORD_PROD=${EMPTY_USER_PASSWORD_PROD}
      - DB_HOST_PROD=${DB_HOST_PROD}
      - DB_PORT_PROD=${DB_PORT_PROD}
      - DB_USER_PROD=${DB_USER_PROD}
      - DB_PASSWORD_PROD=${DB_PASSWORD_PROD}
      - DB_NAME_PROD=${DB_NAME_PROD}
      - BASE_URL_STAGE=${BASE_URL_STAGE}
      - X_API_KEY_STAGE=${X_API_KEY_STAGE}
      - URL_PREFIX_STAGE=${URL_PREFIX_STAGE}
      - USER_PHONE_STAGE=${USER_PHONE_STAGE}
      - USER_PASS_STAGE=${USER_PASS_STAGE}
      - EMPTY_USER_PHONE_STAGE=${EMPTY_USER_PHONE_STAGE}
      - EMPTY_USER_PASS_STAGE=${EMPTY_USER_PASS_STAGE}
      - DB_HOST_STAGE=${DB_HOST_STAGE}
      - DB_PORT_STAGE=${DB_PORT_STAGE}
      - DB_USER_STAGE=${DB_USER_STAGE}
      - DB_PASSWORD_STAGE=${DB_PASSWORD_STAGE}
      - DB_NAME_STAGE=${DB_NAME_STAGE}
      - FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true
    volumes:
      - .:/app
      - ./allure-results:/app/allure-results
      - ./junit-reports:/app/junit-reports
    # Команда запуска (можно менять параметры здесь)
    command: >
      sh -c "opentelemetry-instrument pytest -m smoke --env=${TARGET_ENV:-prod} --alluredir=allure-results --clean-alluredir --junitxml=junit-reports/report_smoke.xml &&
             opentelemetry-instrument pytest -m 'regression and not smoke' --env=${TARGET_ENV:-prod} --alluredir=allure-results --junitxml=junit-reports/report_regression.xml &&
             opentelemetry-instrument pytest -m performance --env=${TARGET_ENV:-prod} --alluredir=allure-results --junitxml=junit-reports/report_performance.xml"