name: API Smoke Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

# Глобальные настройки окружения
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-automation:
    runs-on: ubuntu-latest

    # Права доступа внутри джобы — это стандарт безопасности
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run API Tests
        # Все секреты пробрасываются именно здесь, перед запуском тестов
        env:
          ENV_TYPE: ${{ secrets.ENV_TYPE }}
          BASE_URL_PROD: ${{ secrets.BASE_URL_PROD }}
          X_API_KEY_PROD: ${{ secrets.X_API_KEY_PROD }}

          # User with history
          USER_PHONE_NUMBER_PROD: ${{ secrets.USER_PHONE_NUMBER_PROD }}
          USER_PASSWORD_PROD: ${{ secrets.USER_PASSWORD_PROD }}

          # User with empty history
          EMPTY_USER_PHONE_NUMBER_PROD: ${{ secrets.EMPTY_USER_PHONE_NUMBER_PROD }}
          EMPTY_USER_PASSWORD_PROD: ${{ secrets.EMPTY_USER_PASSWORD_PROD }}

          # Stage Environment
          BASE_URL_STAGE: ${{ secrets.BASE_URL_STAGE }}
          X_API_KEY_STAGE: ${{ secrets.X_API_KEY_STAGE }}
          USER_PHONE_STAGE: ${{ secrets.USER_PHONE_STAGE }}
          USER_PASS_STAGE: ${{ secrets.USER_PASS_STAGE }}
          EMPTY_USER_PHONE_STAGE: ${{ secrets.EMPTY_USER_PHONE_STAGE }}
          EMPTY_USER_PASS_STAGE: ${{ secrets.EMPTY_USER_PASS_STAGE }}

          # Database PROD
          DB_HOST_PROD: ${{ secrets.DB_HOST_PROD }}
          DB_PORT_PROD: ${{ secrets.DB_PORT_PROD }}
          DB_USER_PROD: ${{ secrets.DB_USER_PROD }}
          DB_PASSWORD_PROD: ${{ secrets.DB_PASSWORD_PROD }}
          DB_NAME_PROD: ${{ secrets.DB_NAME_PROD }}

          # Database STAGE
          DB_HOST_STAGE: ${{ secrets.DB_HOST_STAGE }}
          DB_PORT_STAGE: ${{ secrets.DB_PORT_STAGE }}
          DB_USER_STAGE: ${{ secrets.DB_USER_STAGE }}
          DB_PASSWORD_STAGE: ${{ secrets.DB_PASSWORD_STAGE }}
          DB_NAME_STAGE: ${{ secrets.DB_NAME_STAGE }}
        run: |
          pytest -m smoke --alluredir=allure-results -n 2

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          retention-days: 10

      - name: Load Allure history
        if: always()
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

        # НОВЫЙ ШАГ: Удаляем мусор, если он случайно попал в историю
      - name: Clean history junk
        if: always()
        run: |
          if [ -d "gh-pages" ]; then
            cd gh-pages
            # Добавляем -A, чтобы видеть скрытые файлы типа .env
            # И добавляем .nojekyll в список исключений (он нужен GitHub)
            ls -A | grep -vE '^[0-9]+$|history|index.html|last-history|favicon.ico|.nojekyll' | xargs rm -rf || true
            cd ..
          fi

      - name: Build Allure Report
        if: always()
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          allure_history: allure-history
          keep_reports: 20

      - name: Deploy Allure Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-history
          publish_branch: gh-pages
          force_orphan: true

      - name: Send Telegram Notification
        if: always() # Оповещение придет в любом случае
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: html
          message: |
            <b>🚀 Project: ${{ github.repository }}</b>
            <b>Статус:</b> ${{ job.status == 'success' && '✅ Успешно' || '❌ Ошибка / Broken' }}
            
            📊 <b>Отчет Allure:</b> <a href="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/">Посмотреть результаты</a>
            
            👤 Автор: ${{ github.actor }}
            📝 Коммит: ${{ github.event.head_commit.message }}