name: API Smoke Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

# Global env settings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-automation:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # turned on cashing dependencies from requirements.txt file

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run API Tests
        env:
          ENV_TYPE: ${{ secrets.ENV_TYPE }}
          BASE_URL_PROD: ${{ secrets.BASE_URL_PROD }}
          X_API_KEY_PROD: ${{ secrets.X_API_KEY_PROD }}

          # User with history
          USER_PHONE_NUMBER_PROD: ${{ secrets.USER_PHONE_NUMBER_PROD }}
          USER_PASSWORD_PROD: ${{ secrets.USER_PASSWORD_PROD }}

          # User with empty history
          EMPTY_USER_PHONE_NUMBER_PROD: ${{ secrets.EMPTY_USER_PHONE_NUMBER_PROD }}
          EMPTY_USER_PASSWORD_PROD: ${{ secrets.EMPTY_USER_PASSWORD_PROD }}

          # Stage Environment
          BASE_URL_STAGE: ${{ secrets.BASE_URL_STAGE }}
          X_API_KEY_STAGE: ${{ secrets.X_API_KEY_STAGE }}
          USER_PHONE_STAGE: ${{ secrets.USER_PHONE_STAGE }}
          USER_PASS_STAGE: ${{ secrets.USER_PASS_STAGE }}
          EMPTY_USER_PHONE_STAGE: ${{ secrets.EMPTY_USER_PHONE_STAGE }}
          EMPTY_USER_PASS_STAGE: ${{ secrets.EMPTY_USER_PASS_STAGE }}

          # Database PROD
          DB_HOST_PROD: ${{ secrets.DB_HOST_PROD }}
          DB_PORT_PROD: ${{ secrets.DB_PORT_PROD }}
          DB_USER_PROD: ${{ secrets.DB_USER_PROD }}
          DB_PASSWORD_PROD: ${{ secrets.DB_PASSWORD_PROD }}
          DB_NAME_PROD: ${{ secrets.DB_NAME_PROD }}

          # Database STAGE
          DB_HOST_STAGE: ${{ secrets.DB_HOST_STAGE }}
          DB_PORT_STAGE: ${{ secrets.DB_PORT_STAGE }}
          DB_USER_STAGE: ${{ secrets.DB_USER_STAGE }}
          DB_PASSWORD_STAGE: ${{ secrets.DB_PASSWORD_STAGE }}
          DB_NAME_STAGE: ${{ secrets.DB_NAME_STAGE }}
        run: |
          pytest -m regression --alluredir=allure-results --junitxml=report.xml -n 2
#          If smoke tests failed, regression tests wouldn't be run
#          Regression tests will exclude smoke tests because "and not smoke"
#          pytest -m "regression and not smoke" --alluredir=allure-results -n 2

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          retention-days: 10

      - name: Load Allure history
        if: always()
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Clean history junk
        if: always()
        run: |
          if [ -d "gh-pages" ]; then
            cd gh-pages
            # Adding -A so to see hidden files like .env
            # Adding .nojekyll to the exception list  (GitHub needs it)
            ls -A | grep -vE '^[0-9]+$|history|index.html|last-history|favicon.ico|.nojekyll' | xargs rm -rf || true
            cd ..
          fi

      - name: Build Allure Report
        if: always()
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          allure_history: allure-history
          keep_reports: 20

      - name: Deploy Allure Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-history
          publish_branch: gh-pages
          force_orphan: true

      - name: Extract Test Stats
        if: always()
        run: |
          python <<EOF
          import xml.etree.ElementTree as ET
          import os
            
          report_file = 'report.xml'
          if not os.path.exists(report_file):
              print(f"Error: {report_file} not found!")
              stats = {'total': 0, 'failures': 0, 'errors': 0, 'skipped': 0, 'passed': 0}
          else:
              try:
                  tree = ET.parse(report_file)
                  root = tree.getroot()
            
                  # Если pytest упаковал всё в <testsuites>, суммируем все <testsuite>
                  if root.tag == 'testsuites':
                      total = sum(int(s.get('tests', 0)) for s in root.findall('testsuite'))
                      failures = sum(int(s.get('failures', 0)) for s in root.findall('testsuite'))
                      errors = sum(int(s.get('errors', 0)) for s in root.findall('testsuite'))
                      skipped = sum(int(s.get('skipped', 0)) for s in root.findall('testsuite'))
                  else:
                      total = int(root.get('tests', 0))
                      failures = int(root.get('failures', 0))
                      errors = int(root.get('errors', 0))
                      skipped = int(root.get('skipped', 0))
            
                  passed = total - failures - errors - skipped
                  stats = {'total': total, 'failures': failures + errors, 'skipped': skipped, 'passed': passed}
              except Exception as e:
                  print(f"Parsing error: {e}")
                  stats = {'total': 0, 'failures': 0, 'errors': 0, 'skipped': 0, 'passed': 0}
            
              # Записываем в GITHUB_ENV
              with open(os.environ['GITHUB_ENV'], 'a') as f:
                  f.write(f"PASSED={stats['passed']}\n")
                  f.write(f"FAILED={stats['failures']}\n")
                  f.write(f"SKIPPED={stats['skipped']}\n")
                  f.write(f"TOTAL={stats['total']}\n")
              
              print(f"Extracted stats: {stats}")
          EOF

      - name: Send Telegram Notification
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: html
          message: |
            <b>🚀 Project: ${{ github.repository }}</b>
            
            ✅ <b>Passed:</b> ${{ env.PASSED }}
            ❌ <b>Failed:</b> ${{ env.FAILED }}
            ⏩ <b>Skipped:</b> ${{ env.SKIPPED }}
            📝 <b>Total:</b> ${{ env.TOTAL }}
            
            Job status: ${{ job.status }}
            📊 <b>Allure report:</b> <a href="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${{ github.run_number }}/">View results (Run ${{ github.run_number }})</a>
            
            👤 Author: ${{ github.actor }}
            📝 Commit: ${{ github.event.head_commit.message }}